<script>
  // 1. TU METS LE PREMIER CODE ICI (Les données des frontières)
  const communesGeoJSON = {
    "type": "FeatureCollection",
    "features": [
      // ... toutes les coordonnées que je t'ai données ...
    ]
  };

  // 2. TU METS LE DEUXIÈME CODE JUSTE EN DESSOUS (La configuration Leaflet)
  // Initialisation de la carte
  const map = L.map('map').setView([18.5392, -72.335], 12); 

  // Fond de carte sombre
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
  }).addTo(map);

  // Fonction de couleur
  function getZoneColor(status) {
    switch (status) {
      case 'Danger confirmé': return '#ef4444';
      case 'Alerte de base':  return '#f59e0b';
      case 'Calme relatif':    return '#10b981';
      default:                 return '#9ca3af';
    }
  }

  // Affichage du GeoJSON sur la carte
  L.geoJSON(communesGeoJSON, {
    style: function(feature) {
      return {
        fillColor: getZoneColor(feature.properties.status),
        weight: 1.5,
        opacity: 0.8,
        color: '#ffffff',
        fillOpacity: 0.5
      };
    },
    onEachFeature: function(feature, layer) {
      layer.bindPopup(`<b>${feature.properties.name}</b><br>Statut : ${feature.properties.status}`);
    }
  }).addTo(map);
</script>

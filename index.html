<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti Studio - Delmas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        #sidebar { width: 350px; background: #1a1a1a; padding: 20px; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        h2 { font-size: 1.2rem; color: #00ff99; margin-top: 0; text-transform: uppercase; }
        .legend-item { margin: 10px 0; display: flex; align-items: center; font-size: 0.9rem; }
        .color-box { width: 20px; height: 12px; margin-right: 10px; border-radius: 2px; }
        textarea { width: 100%; height: 250px; background: #2b2b2b; color: #00ff99; border: 1px solid #444; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.8rem; resize: none; margin-top: 15px; }
        button { background: #ff3366; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="sidebar">
        <h2>SafeHaiti Communes</h2>
        <hr style="border: 1px solid #444; margin-bottom: 15px;">
        
        <div class="legend-item">
            <div class="color-box" style="background: rgba(30, 58, 138, 0.4); border: 2px solid #1E3A8A;"></div>
            <span>Croix-des-Bouquets (DÉFINITIF 🔵)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: rgba(0, 255, 255, 0.4); border: 2px solid #00FFFF;"></div>
            <span>Cité Soleil (DÉFINITIF 🌐)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: rgba(255, 140, 0, 0.3); border: 2px solid #FF8C00;"></div>
            <span>Tabarre (DÉFINITIF 🟠)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: transparent; border: 2px solid #00ff99;"></div>
            <span>Tracé Delmas / Orgs (Vert 🟢)</span>
        </div>

        <button onclick="clearLastPoint()">Annuler dernier point</button>
        <button onclick="clearAll()" style="background: #444;">Réinitialiser Tout</button>

        <textarea id="output" placeholder="Clique sur la carte pour tracer Delmas. Les coordonnées vertes s'afficheront ici..." readonly></textarea>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([18.59, -72.31], 12);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 🔵 1. CROIX-DES-BOUQUETS (DÉFINITIF)
        const croixDefinitif = [
            [18.68333, -72.32574], [18.69373, -72.31613], [18.69178, -72.3024], [18.7295, -72.2945],
            [18.71812, -72.23133], [18.70544, -72.19906], [18.66544, -72.17709], [18.63551, -72.17297],
            [18.61762, -72.15374], [18.59744, -72.1225], [18.5841, -72.13005], [18.57629, -72.12147],
            [18.56327, -72.13211], [18.5343, -72.14893], [18.519, -72.15185], [18.49019, -72.19477],
            [18.5291, -72.22034], [18.54993, -72.22635], [18.56913, -72.23099], [18.56669, -72.23494],
            [18.57483, -72.24197], [18.57922, -72.24609], [18.58199, -72.24833], [18.58557, -72.24747],
            [18.58378, -72.24146], [18.57727, -72.23116], [18.58504, -72.22713], [18.60025, -72.22352],
            [18.60322, -72.2221], [18.61875, -72.22142], [18.63209, -72.24974], [18.64633, -72.2612],
            [18.64193, -72.27339], [18.65478, -72.28699], [18.66141, -72.293], [18.66857, -72.30648],
            [18.67731, -72.32144], [18.67926, -72.32173], [18.68036, -72.32274], [18.68052, -72.32356],
            [18.68112, -72.32461], [18.68179, -72.32481], [18.68195, -72.32508], [18.68203, -72.32609],
            [18.68336, -72.32574]
        ];
        L.polygon(croixDefinitif, { color: '#1E3A8A', fillColor: '#1E3A8A', fillOpacity: 0.15, weight: 2 }).addTo(map);

        // 🌐 2. CITÉ SOLEIL (DÉFINITIF)
        const soleilDefinitif = [
            [18.67707, -72.32162], [18.67677, -72.32355], [18.67666, -72.32486], [18.67658, -72.3255],
            [18.67647, -72.32577], [18.67633, -72.32572], [18.67624, -72.32551], [18.67638, -72.32519],
            [18.67642, -72.32459], [18.67617, -72.32414], [18.67619, -72.32401], [18.67629, -72.32415],
            [18.67641, -72.3241],  [18.67673, -72.31197], [18.67676, -72.32179], [18.67623, -72.3214],
            [18.67626, -72.32107], [18.67625, -72.32089], [18.67625, -72.3207],  [18.67611, -72.32049],
            [18.67589, -72.32031], [18.67561, -72.32024], [18.67554, -72.32033], [18.67554, -72.32037],
            [18.57418, -72.30523], [18.58016, -72.31175], [18.58125, -72.31154], [18.58394, -72.30193],
            [18.58792, -72.29446], [18.59264, -72.28978], [18.59517, -72.28601], [18.59769, -72.28532],
            [18.59716, -72.28922], [18.59826, -72.29043], [18.59923, -72.29562], [18.59915, -72.29811],
            [18.59984, -72.30296], [18.60541, -72.30557], [18.60598, -72.30815], [18.60476, -72.31223],
            [18.60472, -72.31463], [18.60631, -72.31635], [18.60794, -72.31647], [18.60936, -72.31583],
            [18.60944, -72.31939], [18.61176, -72.32459], [18.61766, -72.32832], [18.63364, -72.32613],
            [18.66483, -72.31012], [18.67544, -72.31819], [18.67727, -72.32171]
        ];
        L.polygon(soleilDefinitif, { color: '#00FFFF', fillColor: '#00FFFF', fillOpacity: 0.15, weight: 2 }).addTo(map);

        // 🟠 3. TABARRE (DÉFINITIF)
        const tabarreDefinitif = [
            [18.57426, -72.3053], [18.57464, -72.30334], [18.57401, -72.30085], [18.57354, -72.29929],
            [18.57302, -72.29714], [18.57253, -72.29515], [18.57232, -72.29347], [18.57212, -72.2924],
            [18.57141, -72.29143], [18.57062, -72.29036], [18.5706, -72.28871], [18.57047, -72.28695],
            [18.5702, -72.28617], [18.56982, -72.28564], [18.56905, -72.28481], [18.56803, -72.28397],
            [18.56724, -72.2833], [18.56683, -72.28286], [18.5661, -72.28209], [18.56576, -72.28178],
            [18.56529, -72.28139], [18.56504, -72.28114], [18.56439, -72.28046], [18.56342, -72.27882],
            [18.5629, -72.27737], [18.56275, -72.27671], [18.56278, -72.27566], [18.56291, -72.27473],
            [18.57438, -72.30532]
        ];
        L.polygon(tabarreDefinitif, { color: '#FF8C00', fillColor: '#FF8C00', fillOpacity: 0.15, weight: 2 }).addTo(map);

        // 🟢 4. TRACÉ INTERACTIF DELMAS (Ligne continue Verte)
        let activePoints = [];
        let greenLine = L.polyline([], { color: '#00ff99', weight: 3 }).addTo(map);
        let markers = [];

        map.on('click', function(e) {
            const lat = parseFloat(e.latlng.lat.toFixed(5));
            const lng = parseFloat(e.latlng.lng.toFixed(5));
            activePoints.push([lat, lng]);
            
            let marker = L.circleMarker([lat, lng], { radius: 4, color: '#00ff99', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
            markers.push(marker);
            updateMapAndText();
        });

        function updateMapAndText() {
            greenLine.setLatLngs(activePoints);
            let formattedText = "[\n";
            activePoints.forEach((p, idx) => {
                formattedText += `  [${p[0]}, ${p[1]}]${idx < activePoints.length - 1 ? ',' : ''}\n`;
            });
            formattedText += "]";
            document.getElementById('output').value = formattedText;
        }

        function clearLastPoint() {
            if (activePoints.length > 0) {
                activePoints.pop();
                let lastMarker = markers.pop();
                if (lastMarker) map.removeLayer(lastMarker);
                updateMapAndText();
            }
        }

        function clearAll() {
            activePoints = [];
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            updateMapAndText();
        }
    </script>
</body>
</html>

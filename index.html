<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti Studio - Cité Soleil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        #sidebar { width: 350px; background: #1a1a1a; padding: 20px; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        h2 { font-size: 1.2rem; color: #00ff99; margin-top: 0; text-transform: uppercase; }
        .legend-item { margin: 10px 0; display: flex; align-items: center; font-size: 0.9rem; }
        .color-box { width: 20px; height: 12px; margin-right: 10px; border-radius: 2px; }
        textarea { width: 100%; height: 250px; background: #2b2b2b; color: #00ff99; border: 1px solid #444; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.8rem; resize: none; margin-top: 15px; }
        button { background: #ff3366; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="sidebar">
        <h2>Studio : Cité Soleil</h2>
        
        <div class="legend-item">
            <div class="color-box" style="background: rgba(30, 58, 138, 0.4); border: 2px solid #1E3A8A;"></div>
            <span>Croix-des-Bouquets (DÉFINITIF 🔵)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: rgba(255, 165, 0, 0.2); border: 2px solid orange;"></div>
            <span>Ancien Cité Soleil (Orange Pâle 🟠)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: transparent; border: 2px dashed #ff3333;"></div>
            <span>Officiel OSM Cité Soleil (Rouge 🔴)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: transparent; border: 2px solid #00ff99;"></div>
            <span>Ton Nouveau Tracé (Vert 🟢)</span>
        </div>

        <button onclick="clearLastPoint()">Annuler dernier point</button>
        <button onclick="clearAll()" style="background: #444;">Réinitialiser Tout</button>

        <textarea id="output" placeholder="Tes coordonnées vertes s'afficheront ici..." readonly></textarea>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([18.62, -72.33], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 🔵 1. CROIX-DES-BOUQUETS (DÉFINITIF)
        const croixDefinitif = [
            [18.68333, -72.32574], [18.69373, -72.31613], [18.69178, -72.3024], [18.7295, -72.2945],
            [18.71812, -72.23133], [18.70544, -72.19906], [18.66544, -72.17709], [18.63551, -72.17297],
            [18.61762, -72.15374], [18.59744, -72.1225], [18.5841, -72.13005], [18.57629, -72.12147],
            [18.56327, -72.13211], [18.5343, -72.14893], [18.519, -72.15185], [18.49019, -72.19477],
            [18.5291, -72.22034], [18.54993, -72.22635], [18.56913, -72.23099], [18.56669, -72.23494],
            [18.57483, -72.24197], [18.57922, -72.24609], [18.58199, -72.24833], [18.58557, -72.24747],
            [18.58378, -72.24146], [18.57727, -72.23116], [18.58504, -72.22713], [18.60025, -72.22352],
            [18.60322, -72.2221], [18.61875, -72.22142], [18.63209, -72.24974], [18.64633, -72.2612],
            [18.64193, -72.27339], [18.65478, -72.28699], [18.66141, -72.293], [18.66857, -72.30648],
            [18.67731, -72.32144], [18.67926, -72.32173], [18.68036, -72.32274], [18.68052, -72.32356],
            [18.68112, -72.32461], [18.68179, -72.32481], [18.68195, -72.32508], [18.68203, -72.32609],
            [18.68336, -72.32574]
        ];
        L.polygon(croixDefinitif, { color: '#1E3A8A', fillColor: '#1E3A8A', fillOpacity: 0.2, weight: 3 }).addTo(map);

        // 🟠 2. ANCIENNES COORDONNÉES CITÉ SOLEIL (Orange Pâle)
        const ancienCiteSoleil = [
            [18.67873, -72.32094], [18.66475, -72.31665], [18.65841, -72.31802], [18.65256, -72.33038],
            [18.64541, -72.3369],  [18.62671, -72.34737], [18.62834, -72.35767], [18.62054, -72.35064],
            [18.61501, -72.35064],  [18.60119, -72.34583], [18.58151, -72.34102], [18.57321, -72.34935],
            [18.5689, -72.3527],    [18.56605, -72.35312], [18.56434, -72.353],   [18.56482, -72.34847],
            [18.56295, -72.34109],  [18.56584, -72.3369],  [18.56609, -72.33295], [18.5669, -72.32665],
            [18.56694, -72.32356],  [18.56503, -72.31768], [18.56442, -72.31489], [18.56633, -72.31274],
            [18.5741, -72.30515],   [18.58019, -72.31197], [18.5808, -72.31154],  [18.58422, -72.30201],
            [18.58808, -72.29442],  [18.5928, -72.28978],  [18.5954, -72.28588],  [18.59764, -72.28515],
            [18.59699, -72.28935],  [18.59788, -72.29034], [18.59884, -72.29394], [18.59913, -72.29562],
            [18.59913, -72.29794],  [18.59962, -72.30291], [18.6032, -72.30444],  [18.60543, -72.3057],
            [18.60578, -72.30826],  [18.60511, -72.31092], [18.6045, -72.31287],  [18.60468, -72.31454],
            [18.60635, -72.31637],  [18.60765, -72.31639], [18.60923, -72.31575], [18.60931, -72.31956],
            [18.61167, -72.32454],  [18.61777, -72.32849], [18.63362, -72.32609], [18.66458, -72.30995],
            [18.67897, -72.32102]
        ];
        L.polygon(ancienCiteSoleil, { color: 'orange', fillColor: 'orange', fillOpacity: 0.08, weight: 2 }).addTo(map);

        // 🔴 3. LIMITES OFFICIELLES CITÉ SOLEIL (OSM Reference)
        const officielOSMCiteSoleil = [
            [18.6788, -72.3210], [18.6650, -72.3165], [18.6552, -72.3198], [18.6445, -72.3385],
            [18.6250, -72.3480], [18.6275, -72.3585], [18.6190, -72.3510], [18.6005, -72.3460],
            [18.5800, -72.3415], [18.5680, -72.3535], [18.5640, -72.3530], [18.5625, -72.3405],
            [18.5665, -72.3230], [18.5640, -72.3140], [18.5745, -72.3050], [18.5810, -72.3120],
            [18.5885, -72.2940], [18.5955, -72.2855], [18.5995, -72.3030], [18.6055, -72.3055],
            [18.6045, -72.3130], [18.6095, -72.3195], [18.6175, -72.3285], [18.6335, -72.3260],
            [18.6645, -72.3100], [18.6788, -72.3210]
        ];
        L.polyline(officielOSMCiteSoleil, { color: '#ff3333', weight: 2, dashArray: '5, 5' }).addTo(map);

        // 🟢 4. TRACÉ INTERACTIF (Ligne continue)
        let activePoints = [];
        let greenLine = L.polyline([], { color: '#00ff99', weight: 3 }).addTo(map);
        let markers = [];

        map.on('click', function(e) {
            const lat = parseFloat(e.latlng.lat.toFixed(5));
            const lng = parseFloat(e.latlng.lng.toFixed(5));
            activePoints.push([lat, lng]);
            
            let marker = L.circleMarker([lat, lng], { radius: 4, color: '#00ff99', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
            markers.push(marker);
            updateMapAndText();
        });

        function updateMapAndText() {
            greenLine.setLatLngs(activePoints);
            let formattedText = "[\n";
            activePoints.forEach((p, idx) => {
                formattedText += `  [${p[0]}, ${p[1]}]${idx < activePoints.length - 1 ? ',' : ''}\n`;
            });
            formattedText += "]";
            document.getElementById('output').value = formattedText;
        }

        function clearLastPoint() {
            if (activePoints.length > 0) {
                activePoints.pop();
                let lastMarker = markers.pop();
                if (lastMarker) map.removeLayer(lastMarker);
                updateMapAndText();
            }
        }

        function clearAll() {
            activePoints = [];
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            updateMapAndText();
        }
    </script>
</body>
</html>

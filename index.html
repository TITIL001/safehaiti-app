        let activePoints = [];
        let greenLine = L.polyline([], { color: '#00ff99', weight: 3 }).addTo(map);
        let markers = [];

        map.on('click', function(e) {
            const lat = parseFloat(e.latlng.lat.toFixed(5));
            const lng = parseFloat(e.latlng.lng.toFixed(5));
            activePoints.push([lat, lng]);
            
            let marker = L.circleMarker([lat, lng], { radius: 4, color: '#00ff99', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
            markers.push(marker);
            updateMapAndText();
        });

        function updateMapAndText() {
            greenLine.setLatLngs(activePoints);
            let formattedText = "[\n";
            activePoints.forEach((p, idx) => {
                formattedText += `  [${p[0]}, ${p[1]}]${idx < activePoints.length - 1 ? ',' : ''}\n`;
            });
            formattedText += "]";
            document.getElementById('output').value = formattedText;
        }

        function clearLastPoint() {
            if (activePoints.length > 0) {
                activePoints.pop();
                let lastMarker = markers.pop();
                if (lastMarker) map.removeLayer(lastMarker);
                updateMapAndText();
            }
        }

        function clearAll() {
            activePoints = [];
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            updateMapAndText();
        }

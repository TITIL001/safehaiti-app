<!DOCTYPE html>
<html>
<head>
    <title>SafeHaiti Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
  // 1. Données géographiques des 8 communes
  const communesGeoJSON = {
    "type": "FeatureCollection",
    "features": [
      {
        "type": "Feature",
        "properties": { "name": "Delmas", "status": "Calme relatif" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.3194, 18.5361], [-72.3111, 18.5528], [-72.2944, 18.5639], [-72.2833, 18.5556], [-72.2861, 18.5333], [-72.3028, 18.5250], [-72.3194, 18.5361]]]
        }
      },
      {
        "type": "Feature",
        "properties": { "name": "Cité Soleil", "status": "Danger confirmé" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.3444, 18.5694], [-72.3333, 18.5944], [-72.2944, 18.6028], [-72.2917, 18.5639], [-72.3111, 18.5528], [-72.3194, 18.5361], [-72.3444, 18.5694]]]
        }
      },
      {
        "type": "Feature",
        "properties": { "name": "Tabarre", "status": "Alerte de base" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.2917, 18.5639], [-72.2944, 18.6028], [-72.2417, 18.5944], [-72.2389, 18.5583], [-72.2611, 18.5444], [-72.2833, 18.5556], [-72.2917, 18.5639]]]
        }
      },
      {
        "type": "Feature",
        "properties": { "name": "Croix-des-Bouquets", "status": "Danger confirmé" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.2417, 18.5944], [-72.1139, 18.6139], [-72.1028, 18.4944], [-72.2222, 18.5111], [-72.2389, 18.5583], [-72.2417, 18.5944]]]
        }
      },
      {
        "type": "Feature",
        "properties": { "name": "Pétion-Ville", "status": "Calme relatif" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.3028, 18.5250], [-72.2861, 18.5333], [-72.2611, 18.5444], [-72.2222, 18.5111], [-72.2333, 18.4611], [-72.2889, 18.4694], [-72.3028, 18.5250]]]
        }
      },
      {
        "type": "Feature",
        "properties": { "name": "Port-au-Prince", "status": "Alerte de base" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.3528, 18.5500], [-72.3194, 18.5361], [-72.3028, 18.5250], [-72.3278, 18.5028], [-72.3500, 18.5167], [-72.3528, 18.5500]]]
        }
      },
      {
        "type": "Feature",
        "properties": { "name": "Carrefour", "status": "Calme relatif" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.4361, 18.5333], [-72.3528, 18.5500], [-72.3500, 18.5167], [-72.3278, 18.5028], [-72.3389, 18.4389], [-72.4222, 18.4444], [-72.4361, 18.5333]]]
        }
      },
      {
        "type": "Feature",
        "properties": { "name": "Ganthier", "status": "Alerte de base" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[[-72.1139, 18.6139], [-71.9667, 18.6250], [-71.9528, 18.4722], [-72.1028, 18.4944], [-72.1139, 18.6139]]]
        }
      }
    ]
  };

  // 2. Initialisation de la carte Leaflet centrée sur PAP
  const map = L.map('map').setView([18.5392, -72.335], 11); 

  // 3. Fond de carte sombre (Mode nuit)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 4. Attribution des couleurs selon le statut
  function getZoneColor(status) {
    switch (status) {
      case 'Danger confirmé': return '#ef4444'; // Rouge
      case 'Alerte de base':  return '#f59e0b'; // Orange
      case 'Calme relatif':    return '#10b981'; // Vert
      default:                 return '#9ca3af';
    }
  }

  // 5. Dessin des polygones
  L.geoJSON(communesGeoJSON, {
    style: function(feature) {
      return {
        fillColor: getZoneColor(feature.properties.status),
        weight: 1.5,
        opacity: 0.8,
        color: '#ffffff',
        fillOpacity: 0.5
      };
    },
    onEachFeature: function(feature, layer) {
      layer.bindPopup(`<b>${feature.properties.name}</b><br>Statut : ${feature.properties.status}`);
    }
  }).addTo(map);
</script>

</body>
</html>

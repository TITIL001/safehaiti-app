<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti Studio - Delmas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        #sidebar { width: 350px; background: #1a1a1a; padding: 20px; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        h2 { font-size: 1.2rem; color: #00ff99; margin-top: 0; text-transform: uppercase; }
        .legend-item { margin: 10px 0; display: flex; align-items: center; font-size: 0.9rem; }
        .color-box { width: 20px; height: 12px; margin-right: 10px; border-radius: 2px; }
        textarea { width: 100%; height: 220px; background: #2b2b2b; color: #ff3366; border: 1px solid #444; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.8rem; resize: none; margin-top: 15px; }
        button { background: #ff3366; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="sidebar">
        <h2>SafeHaiti Communes</h2>
        <hr style="border: 1px solid #444; margin-bottom: 15px;">
        
        <div class="legend-item">
            <div class="color-box" style="background: rgba(30, 58, 138, 0.4); border: 2px solid #1E3A8A;"></div>
            <span>Croix-des-Bouquets (🔵 DÉFINITIF)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: rgba(0, 255, 255, 0.2); border: 2px solid #00FFFF;"></div>
            <span>Cité Soleil (🌐 INTÉGRÉ)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: rgba(255, 140, 0, 0.2); border: 2px solid #FF8C00;"></div>
            <span>Tabarre (🟠 DÉFINITIF)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: transparent; border: 2px solid #ff3366;"></div>
            <span>Delmas / Orgs (🔴 TRACÉ EN COURS)</span>
        </div>

        <button onclick="clearLastPoint()">Annuler dernier point</button>
        <button onclick="clearAll()" style="background: #444;">Effacer le tracé actuel</button>

        <textarea id="output" placeholder="Clique sur la carte pour récolter les coordonnées de Delmas..." readonly></textarea>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([18.585, -72.29], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 🔵 1. CROIX-DES-BOUQUETS
        const croixDefinitif = [
            [18.68333, -72.32574], [18.69373, -72.31613], [18.69178, -72.3024], [18.7295, -72.2945],
            [18.71812, -72.23133], [18.70544, -72.19906], [18.66544, -72.17709], [18.63551, -72.17297],
            [18.61762, -72.15374], [18.59744, -72.1225], [18.5841, -72.13005], [18.57629, -72.12147],
            [18.56327, -72.13211], [18.5343, -72.14893], [18.519, -72.15185], [18.49019, -72.19477],
            [18.5291, -72.22034], [18.54993, -72.22635], [18.56913, -72.23099], [18.56669, -72.23494],
            [18.57483, -72.24197], [18.57922, -72.24609], [18.58199, -72.24833], [18.58557, -72.24747],
            [18.58378, -72.24146], [18.57727, -72.23116], [18.58504, -72.22713], [18.60025, -72.22352],
            [18.60322, -72.2221], [18.61875, -72.22142], [18.63209, -72.24974], [18.64633, -72.2612],
            [18.64193, -72.27339], [18.65478, -72.28699], [18.66141, -72.293], [18.66857, -72.30648],
            [18.67731, -72.32144], [18.68333, -72.32574]
        ];
        L.polygon(croixDefinitif, { color: '#1E3A8A', fillColor: '#1E3A8A', fillOpacity: 0.15, weight: 2 }).addTo(map);

        // 🌐 2. CITÉ SOLEIL
        const soleilDefinitif = [
            [18.63364, -72.32613], [18.66483, -72.31012], [18.67544, -72.31819], [18.67727, -72.32171],
            [18.65709, -72.32161], [18.65543, -72.32626], [18.65288, -72.33142], [18.64817, -72.33564],
            [18.64114, -72.33932], [18.63244, -72.34351], [18.62685, -72.34804], [18.62449, -72.35602],
            [18.61509, -72.3516],  [18.60989, -72.34628], [18.60129, -72.34652], [18.59394, -72.33862],
            [18.58634, -72.34008], [18.57814, -72.34439], [18.5731, -72.34707],  [18.56462, -72.35319],
            [18.56289, -72.34119], [18.56639, -72.33298], [18.56488, -72.31755], [18.57418, -72.30523],
            [18.58394, -72.30193], [18.59264, -72.28978], [18.59769, -72.28532], [18.59923, -72.29562],
            [18.60541, -72.30557], [18.60472, -72.31463], [18.60936, -72.31583], [18.61766, -72.32832],
            [18.63364, -72.32613]
        ];
        L.polygon(soleilDefinitif, { color: '#00FFFF', fillColor: '#00FFFF', fillOpacity: 0.12, weight: 2 }).addTo(map);

        // 🟠 3. TABARRE
        const tabarreDefinitif = [
            [18.64799, -72.25901], [18.64575, -72.2706],  [18.64976, -72.28283], [18.65918, -72.29073],
            [18.66885, -72.3018],  [18.67381, -72.31287], [18.6795, -72.32051],  [18.66458, -72.30995],
            [18.63362, -72.32609], [18.61777, -72.32849], [18.61167, -72.32454], [18.60931, -72.31956],
            [18.60635, -72.31637], [18.6045, -72.31287],  [18.60578, -72.30826], [18.59962, -72.30291],
            [18.59884, -72.29394], [18.59764, -72.28515], [18.58808, -72.29442], [18.58019, -72.31197],
            [18.56633, -72.31274], [18.56503, -72.31768], [18.56694, -72.32356], [18.56584, -72.3369],
            [18.56482, -72.34847], [18.5689, -72.3527],   [18.58151, -72.34102], [18.61501, -72.35064],
            [18.62671, -72.34737], [18.65256, -72.33038], [18.67873, -72.32094], [18.64799, -72.25901]
        ];
        L.polygon(tabarreDefinitif, { color: '#FF8C00', fillColor: '#FF8C00', fillOpacity: 0.12, weight: 2 }).addTo(map);

        // 🔴 4. STUDIO DE TRACÉ INTERACTIF (Delmas / Organisations)
        let activePoints = [];
        let redLine = L.polyline([], { color: '#ff3366', weight: 3 }).addTo(map);
        let markers = [];

        map.on('click', function(e) {
            const lat = parseFloat(e.latlng.lat.toFixed(5));
            const lng = parseFloat(e.latlng.lng.toFixed(5));
            activePoints.push([lat, lng]);
            
            let marker = L.circleMarker([lat, lng], { radius: 5, color: '#ff3366', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
            markers.push(marker);
            updateMapAndText();
        });

        function updateMapAndText() {
            redLine.setLatLngs(activePoints);
            let formattedText = "[\n";
            activePoints.forEach((p, idx) => {
                formattedText += `  [${p[0]}, ${p[1]}]${idx < activePoints.length - 1 ? ',' : ''}\n`;
            });
            formattedText += "]";
            document.getElementById('output').value = formattedText;
        }

        function clearLastPoint() {
            if (activePoints.length > 0) {
                activePoints.pop();
                let lastMarker = markers.pop();
                if (lastMarker) map.removeLayer(lastMarker);
                updateMapAndText();
            }
        }

        function clearAll() {
            activePoints = [];
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            updateMapAndText();
        }
    </script>
</body>
</html>
